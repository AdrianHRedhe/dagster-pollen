services:
  dagster:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - pollen-postgres
    networks:
      - default
      - dagster-hub_default

  pollen-postgres:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  dagster-hub_default:
    external: true
